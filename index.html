<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STAN — Strategiczny doradca decyzji</title>

<link rel="stylesheet" href="/styles.css?v=1">

</head>

<body>

<div class="container">

<h1>STAN</h1>
<p class="subtitle">AI, które pomaga zrozumieć Twoje decyzje.</p>

<div class="card">

<textarea id="situation" placeholder="Opisz sytuację..."></textarea>

<div class="modes">
<button class="mode active" data-mode="full">Analiza</button>
<button class="mode" data-mode="quick">Szybka</button>
<button class="mode" data-mode="confront">Konfrontacja</button>
</div>

<button id="analyzeBtn" class="mainButton">
Analizuj decyzję
</button>

<div id="status">
Gotowe.
</div>

</div>

<div id="result" class="card hidden">
<h2>Analiza</h2>

<div id="analysisText"></div>

</div>

</div>

<script src="/app.js?v=1"></script>

</body>
</html>
